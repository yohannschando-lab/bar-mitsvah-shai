<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Bar Mitsvah de Shaï</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6efe7;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: white;
      max-width: 700px;
      margin: auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #1f3c88;
      color: white;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }

    #formulaire {
      display: none;
    }

    .section {
      margin-top: 25px;
      padding: 20px;
      background: #fafafa;
      border-radius: 15px;
      border: 1px solid #ddd;
    }

    .max {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

<audio id="musique" loop>
  <source src="musique.mp3" type="audio/mpeg">
</audio>

<div class="card" id="intro">
  <h1>Bar Mitsvah de Shaï</h1>
  <p>Nous avons la joie de vous inviter à célébrer ce moment unique.</p>
  <button onclick="entrer()">Entrer dans l’invitation</button>
</div>

<div class="card" id="formulaire">
  <h2 id="titreFamille"></h2>

  <p>
    📅 Date : [date]<br>
    🕍 Mise des Téfilines : [lieu et heure]<br>
    🎉 Réception : [lieu et heure]
  </p>

  <form onsubmit="envoyer(event)">

    <div class="section">
      <h3>🕍 Mise des Téfilines</h3>

      <select id="presenceTefilines" required>
        <option value="">Serez-vous présents ?</option>
        <option value="oui">Oui, nous serons présents</option>
        <option value="non">Non, nous ne pourrons pas venir</option>
      </select>

      <label>Nombre d’invités pour les Téfilines</label>
      <input id="nbTefilines" type="number" min="0" required>
      <div class="max" id="maxTefilines"></div>
    </div>

    <div class="section">
      <h3>🎉 Réception</h3>

      <select id="presenceReception" required>
        <option value="">Serez-vous présents ?</option>
        <option value="oui">Oui, nous serons présents</option>
        <option value="non">Non, nous ne pourrons pas venir</option>
      </select>

      <label>Nombre d’invités pour la réception</label>
      <input id="nbReception" type="number" min="0" required>
      <div class="max" id="maxReception"></div>
    </div>

    <textarea id="message" placeholder="Message optionnel"></textarea>

    <button type="submit">Envoyer ma réponse</button>
  </form>

  <p id="retour"></p>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbztKiF8kRbZ7FH4n4Cz6WAin4ho7v688RIBem41rq2gP2Ak_6LJkD7r_RtP5PjLtICz/exec";
  const params = new URLSearchParams(window.location.search);
  const code = params.get("famille") || params.get("rsvp");

  let invite = null;

  async function entrer() {
    document.getElementById("musique").play().catch(() => {});
    document.getElementById("intro").style.display = "none";
    document.getElementById("formulaire").style.display = "block";
    chargerInvite();
  }

  async function chargerInvite() {
    const res = await fetch(API_URL + "?code=" + encodeURIComponent(code));
    invite = await res.json();

    if (!invite.ok) {
      document.getElementById("formulaire").innerHTML = "<h2>Lien invalide</h2>";
      return;
    }

    document.getElementById("titreFamille").innerText =
      "Invitation pour " + invite.famille;

    const nbTefilines = document.getElementById("nbTefilines");
    const nbReception = document.getElementById("nbReception");

    nbTefilines.max = invite.tefilinesMax;
    nbReception.max = invite.receptionMax;

    nbTefilines.value = invite.tefilinesMax;
    nbReception.value = invite.receptionMax;

    document.getElementById("maxTefilines").innerText =
      "Maximum autorisé : " + invite.tefilinesMax + " invité(s)";

    document.getElementById("maxReception").innerText =
      "Maximum autorisé : " + invite.receptionMax + " invité(s)";

    nbTefilines.addEventListener("input", function () {
      if (Number(this.value) > invite.tefilinesMax) {
        alert("Maximum autorisé pour les Téfilines : " + invite.tefilinesMax);
        this.value = invite.tefilinesMax;
      }
      if (Number(this.value) < 0) this.value = 0;
    });

    nbReception.addEventListener("input", function () {
      if (Number(this.value) > invite.receptionMax) {
        alert("Maximum autorisé pour la réception : " + invite.receptionMax);
        this.value = invite.receptionMax;
      }
      if (Number(this.value) < 0) this.value = 0;
    });
  }

  async function envoyer(e) {
    e.preventDefault();

    const nbTefilines = Number(document.getElementById("nbTefilines").value);
    const nbReception = Number(document.getElementById("nbReception").value);

    if (nbTefilines > invite.tefilinesMax) {
      alert("Maximum Téfilines : " + invite.tefilinesMax);
      return;
    }

    if (nbReception > invite.receptionMax) {
      alert("Maximum réception : " + invite.receptionMax);
      return;
    }

    const data = {
      code,
      presenceTefilines: document.getElementById("presenceTefilines").value,
      nbTefilines,
      presenceReception: document.getElementById("presenceReception").value,
      nbReception,
      message: document.getElementById("message").value
    };

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await res.json();
    document.getElementById("retour").innerText = result.message;
  }
</script>

</body>
</html>
